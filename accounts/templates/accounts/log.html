{% extends 'base.html' %} {% block content %}
<style>
  .auth-card {
    background: #111114;
    border: 1px solid #2a2a2e;
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 440px;
    margin: 4rem auto;
  }
  .auth-title {
    font-family: "Space Mono", monospace;
    font-size: 1.5rem;
    color: #e8e6e0;
    margin-bottom: 0.3rem;
  }
  .auth-sub {
    color: #555;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .form-label {
    color: #888;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .form-control {
    background: #0d0d0f;
    border: 1px solid #2a2a2e;
    color: #e8e6e0;
    border-radius: 8px;
    padding: 0.65rem 1rem;
  }
  .form-control:focus {
    background: #0d0d0f;
    border-color: #7c6aff;
    color: #e8e6e0;
    box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.15);
  }
  .btn-submit {
    background: #7c6aff;
    color: #fff;
    border: none;
    width: 100%;
    padding: 0.7rem;
    border-radius: 8px;
    font-size: 0.95rem;
    margin-top: 1rem;
    transition: background 0.2s;
  }
  .btn-submit:hover {
    background: #6a58e0;
  }
  .error-msg {
    color: #ff6b6b;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
  .auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    color: #555;
    font-size: 0.88rem;
  }
  .auth-footer a {
    color: #7c6aff;
    text-decoration: none;
  }
</style>

<div class="auth-card">
  <h2 class="auth-title">Welcome back</h2>
  <p class="auth-sub">Sign in to your account</p>
  {% if message %}
  <p class="error-msg">⚠ {{ message }}</p>
  {% endif %}
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input
        type="text"
        name="username"
        class="form-control"
        placeholder="your_username"
        required
      />
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        type="password"
        name="password"
        class="form-control"
        placeholder="••••••••"
        required
      />
    </div>
    <button type="submit" class="btn-submit">Sign In</button>
  </form>
  <p class="auth-footer">
    Don't have an account? <a href="{% url 'userRegister' %}">Register</a>
  </p>
</div>
{% endblock %}

{% extends 'base.html' %} {% block content %}
<style>
  .delete-card {
    background: #111114;
    border: 1px solid #f4433630;
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 440px;
    margin: 4rem auto;
    text-align: center;
  }
  .delete-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }
  .delete-title {
    font-family: "Space Mono", monospace;
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
  }
  .delete-sub {
    color: #555;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .todo-name {
    color: #f44336;
    font-weight: 500;
    margin-bottom: 2rem;
  }
  .btn-confirm {
    background: #f44336;
    color: #fff;
    border: none;
    padding: 0.65rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: background 0.2s;
    cursor: pointer;
  }
  .btn-confirm:hover {
    background: #d32f2f;
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid #2a2a2e;
    color: #888;
    padding: 0.65rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    text-decoration: none;
    margin-left: 0.75rem;
    transition: all 0.2s;
  }
  .btn-cancel:hover {
    border-color: #888;
    color: #e8e6e0;
  }
</style>

<div class="delete-card">
  <div class="delete-icon">🗑</div>
  <h2 class="delete-title">Delete Task?</h2>
  <p class="delete-sub">You are about to delete:</p>
  <p class="todo-name">"{{ todo.title }}"</p>
  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn-confirm">Yes, Delete</button>
    <a href="{% url 'list_html' %}" class="btn-cancel">Cancel</a>
  </form>
</div>
{% endblock %}

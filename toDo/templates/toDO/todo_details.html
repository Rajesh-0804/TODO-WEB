{% extends 'base.html' %} {% block content %}
<style>
  .detail-card {
    background: #111114;
    border: 1px solid #2a2a2e;
    border-radius: 16px;
    padding: 2rem;
    max-width: 600px;
    margin: 2rem auto;
  }
  .detail-title {
    font-family: "Space Mono", monospace;
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 0.85rem 0;
    border-bottom: 1px solid #1e1e22;
    font-size: 0.9rem;
  }
  .info-row:last-child {
    border-bottom: none;
  }
  .info-label {
    color: #555;
  }
  .info-value {
    color: #e8e6e0;
  }
  .detail-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .btn-edit {
    background: #7c6aff;
    color: #fff;
    border: none;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-size: 0.88rem;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-edit:hover {
    background: #6a58e0;
    color: #fff;
  }
  .btn-del {
    background: transparent;
    border: 1px solid #f4433640;
    color: #f44336;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-size: 0.88rem;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn-del:hover {
    background: #f4433615;
    color: #f44336;
  }
  .btn-back {
    background: transparent;
    border: 1px solid #2a2a2e;
    color: #888;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-size: 0.88rem;
    text-decoration: none;
    transition: all 0.2s;
    margin-left: auto;
  }
  .btn-back:hover {
    border-color: #888;
    color: #e8e6e0;
  }
</style>

<div class="detail-card">
  <h2 class="detail-title">{{ data.title }}</h2>
  <div class="info-row">
    <span class="info-label">Description</span>
    <span class="info-value">{{ data.description }}</span>
  </div>
  <div class="info-row">
    <span class="info-label">Priority</span>
    <span class="info-value">{{ data.priority }}</span>
  </div>
  <div class="info-row">
    <span class="info-label">Status</span>
    <span class="info-value">{{ data.status }}</span>
  </div>
  <div class="info-row">
    <span class="info-label">Due Date</span>
    <span class="info-value">{{ data.due_date }}</span>
  </div>
  <div class="info-row">
    <span class="info-label">Created</span>
    <span class="info-value">{{ data.created_at|date:"d M Y" }}</span>
  </div>
  <div class="detail-actions">
    <a href="{% url 'todo_update' data.id %}" class="btn-edit">Edit</a>
    <a href="{% url 'todo_delete' data.id %}" class="btn-del">Delete</a>
    <a href="{% url 'list_html' %}" class="btn-back">Back</a>
  </div>
</div>
{% endblock %}

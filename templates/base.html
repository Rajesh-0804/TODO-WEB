{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoApp</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0d0d0f;
        color: #e8e6e0;
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
      }
      .navbar-toggler {
        border-color: #2a2a2e;
      }
      .navbar-toggler-icon {
        filter: invert(1);
      }
      .navbar {
        background: #111114 !important;
        border-bottom: 1px solid #2a2a2e;
        padding: 1rem 0;
      }
      .navbar-brand {
        font-family: "Space Mono", monospace;
        font-size: 1.3rem;
        color: #7c6aff !important;
        letter-spacing: -1px;
      }
      .nav-link {
        color: #888 !important;
        font-size: 0.9rem;
        transition: color 0.2s;
        margin-left: 1.5rem;
      }
      .nav-link:hover {
        color: #e8e6e0 !important;
      }
      .nav-link.active {
        color: #7c6aff !important;
      }
      .btn-purple {
        background: #7c6aff;
        color: #fff;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 8px;
        font-size: 0.85rem;
        transition: background 0.2s;
      }
      .btn-purple:hover {
        background: #6a58e0;
        color: #fff;
      }
      .alert {
        background: #1a1a1e;
        border: 1px solid #2a2a2e;
        color: #e8e6e0;
        border-radius: 8px;
      }
      .container {
        max-width: 1100px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="{% url 'list_html' %}">// todo</a>

        <!-- Hamburger button for mobile -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            {% if request.user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'list_html' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'userpro' %}">Profile</a>
            </li>
            <li class="nav-item ms-2">
              <a class="btn-purple" href="{% url 'userLogout' %}">Logout</a>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'userRegister' %}">Register</a>
            </li>
            <li class="nav-item ms-2">
              <a class="btn-purple" href="{% url 'login_page' %}">Login</a>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-3">
      {% if messages %} {% for message in messages %}
      <div class="alert">{{ message }}</div>
      {% endfor %} {% endif %}
    </div>

    <div class="container mt-4 pb-5">{% block content %}{% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
